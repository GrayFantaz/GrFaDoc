<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Серый Фэнтези</title>
    <style>
        :root {
            --bg-color: #141414;
            --sidebar-bg: #1A1110;
            --text-color: #EBEBEB;
            --link-color: #DAA520;
            --link-hover: #C79D33;
            --border-color: #e9ecef;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .site-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        .category {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #6c757d;
            margin-top: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .nav-link {
            display: block;
            padding: 6px 0;
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .nav-link.active {
            color: var(--link-color);
            font-weight: 600;
        }

        main {
            flex: 1;
            padding: 40px 60px;
            background-color: var(--bg-color);
            overflow-y: auto;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }
		
		.category-header {
			font-size: 0.9rem;
			text-transform: uppercase;
			font-weight: 700;
			color: #bcbcbc;
			margin-top: 15px;
			margin-bottom: 5px;
			cursor: pointer;
			user-select: none;
		}

		.category-header:hover, .subcategory-header:hover {
			color: var(--link-color);
		}

		.subcategory-list {
			display: none; 
			padding-left: 10px;
			border-left: 2px solid var(--border-color);
			margin-left: 5px;
		}
	
		.subcategory-header {
			font-size: 0.85rem;
			font-weight: 600;
			color: #F5F3EF;
			margin-top: 10px;
			margin-bottom: 5px;
			cursor: pointer;
			user-select: none;
		}

		.article-list {
			display: none;
			padding-left: 15px;
		}

		.expanded {
			display: block !important;
		}

		.toggle-icon {
			display: inline-block;
			width: 15px;
			transition: transform 0.2s;
		}
		.expanded-icon {
			transform: rotate(90deg);
		}
		.geo-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 20px; 
            margin-top: 30px;
            width: 100%;
        }

        .geo-text-block {
            flex: 1 1 300px;
            min-height: auto;
        }

        .geo-image-block {
            flex: 1 1 250px; 
            display: flex;
            justify-content: center;
        }

        .geo-image-block img {
            width: 100%;
            max-width: 300px;
            height: auto; 
            object-fit: cover;
            border-radius: 6px;
            transition: opacity 0.3s ease;
        }

        .geo-buttons-block {
            flex: 0 1 180px; 
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .geo-btn {
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 6px 0;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            text-align: left;
            transition: color 0.2s;
        }

        .geo-btn:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .geo-btn.active {
            color: var(--link-color);
            font-weight: 600;
        }

        .fade-out {
            opacity: 0;
        }

        h1 { font-size: 2.5rem; margin-top: 0; }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 40px; }
        
        .content p { line-height: 1.6; margin-bottom: 15px; }
        .content code { background: #f1f3f5; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .content pre { background: #212529; color: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>

    <aside>
        <div class="site-title">🔲 Серый Фэнтези</div>
        <nav id="sidebar-nav">
            </nav>
    </aside>

    <main>
        <div class="content-container">
            <h1 id="doc-title">Загрузка...</h1>
            <div id="doc-content" class="content"></div>
        </div>
    </main>

    <script src="data.js"></script>

<script>
	const sidebarNav = document.getElementById('sidebar-nav');
	const docTitle = document.getElementById('doc-title');
	const docContent = document.getElementById('doc-content');

	function renderSidebar() {
		const hierarchy = {};

		articles.forEach(article => {
			const cat = article.category || 'Без категории';
			const subcat = article.subcategory || 'Общее';

			if (!hierarchy[cat]) hierarchy[cat] = {};
			if (!hierarchy[cat][subcat]) hierarchy[cat][subcat] = [];

			hierarchy[cat][subcat].push(article);
		});

		let html = '';
		for (const cat in hierarchy) {
			html += `
				<div class="category-group">
					<div class="category-header" onclick="toggleVisibility(this)">
						<span class="toggle-icon">▶</span> ${cat}
					</div>
					<div class="subcategory-list">
			`;

			for (const subcat in hierarchy[cat]) {
				html += `
					<div class="subcategory-group">
						<div class="subcategory-header" onclick="toggleVisibility(this)">
							<span class="toggle-icon">▶</span> ${subcat}
						</div>
						<div class="article-list">
				`;

				hierarchy[cat][subcat].forEach(article => {
					html += `<a class="nav-link" data-id="${article.id}" onclick="handleArticleClick(event, '${article.id}')">${article.title}</a>`;
				});

				html += `</div></div>`; 
			}
			html += `</div></div>`; 
		}
    
		sidebarNav.innerHTML = html;
	}

	window.toggleVisibility = function(element) {
		const nextElement = element.nextElementSibling;
		const icon = element.querySelector('.toggle-icon');
    
		if (nextElement) {
			nextElement.classList.toggle('expanded');
		}
		if (icon) {
			icon.classList.toggle('expanded-icon');
		}
	};

	window.handleArticleClick = function(event, id) {
		loadArticle(id);
	}

	function loadArticle(id) {
		const article = articles.find(a => a.id === id);
		if (article) {
			docTitle.innerHTML = article.title;
			docContent.innerHTML = article.content;

			document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
			const activeLink = document.querySelector(`.nav-link[data-id="${id}"]`);
			if (activeLink) activeLink.classList.add('active');
		} else {
			docTitle.innerHTML = "Статья не найдена";
			docContent.innerHTML = "<p>Выберите статью из меню слева.</p>";
		}
	}

	renderSidebar();
	loadArticle('firstact'); 
	
	const geoData = {
		plan: {
			title: "Планета",
			desc: `<ul><li>Размер планеты: 14 000 КМ в диаметре. Экваториальная окружность 43 900 КМ.</li><li>Вращение: 26 часов</li><li>Ось наклона: 23 градуса.</li><li>Крупные материковые острова, с горами и равнинами.</li><li>70% поверхности планеты, заняты океанами.</li></ul>`,
			img: "https://i.ibb.co/0ymCB4PV/2.png"
		},
		equat: {
			title: "Экваториальная зона",
			desc: `<ul><li>Экваториальная зона: 10 градусов от экватора.</li><li>Температура: 30 градусов постоянная.</li><li>Осадки: 3000 ММ в год.</li><li>Ландшафт: Пышные джунгли, реки, широкие озёра, болотные области. Плоские равнины.</li><li>Жители: Эльфы, Орки, Гноллы.</li></ul>`,
			img: "https://i.ibb.co/bRC9ksP9/3.png"
		},
		subtrop: {
			title: "Субтропический пояс",
			desc: `<ul><li>Субтропический пояс: 25 градусов от экватора.</li><li>Температура: 22-28 градусов.</li><li>Осадки: 1500 ММ в год.</li><li>Ландшафт: Острова с умеренной растительностью, холмистые цепи гор.</li><li>Жители: Орки, Гноллы, Люди, Дворфы.</li></ul>`,
			img: "https://i.ibb.co/wZfDH3g6/4.png"
		},
		norm: {
			title: "Умеренный пояс",
			desc: `<ul><li>Умеренный пояс: 45 градусов от экватора.</li><li>Температура: 12-22 градусов.</li><li>Осадки: 1000 ММ в год.</li><li>Ландшафт: Леса, плодородные равнины, горные цепи, с лесными и травяными зонами.</li><li>Жители: Люди, Дворфы, Орки, Гноллы.</li></ul>`,
			img: "https://i.ibb.co/qYL8Ky1f/5.png"
		},
		subpol: {
			title: "Субполярный пояс",
			desc: `<ul><li>Субполярный пояс: 60 градусов от экватора.</li><li>Температура: 2-12 градусов.</li><li>Осадки: 1200 ММ в год.</li><li>Ландшафт: Сосновые и лиственные леса. Холмы и низкие горы. </li><li>Жители: Дворфы, Люди, Орки.</li></ul>`,
			img: "https://i.ibb.co/RkRmKtPb/6.png"
		},
		pol: {
			title: "Полярная зона",
			desc: `<ul><li>Полярная зона: 90 градусов.</li><li>Температура: -10-5 градусов.</li><li>Осадки: 500 ММ в год.</li><li>Ландшафт: Тундра, редкая растительность, озёра, горы.</li><li>Жители: Дворфы, Гномы, Эльфы, Люди.</li></ul>`,
			img: "https://i.ibb.co/60wJHxqQ/7.png"
		}
	};

	window.changeGeo = function(regionId, btnElement) {
		const data = geoData[regionId];
		if (!data) return;

		const textBlock = document.getElementById('geo-text');
		const img = document.getElementById('geo-img');
		const title = document.getElementById('geo-title');
		const desc = document.getElementById('geo-desc');

		document.querySelectorAll('.geo-btn').forEach(b => b.classList.remove('active'));
		if (btnElement) btnElement.classList.add('active');

		textBlock.classList.add('fade-out');
		img.style.opacity = '0';

		setTimeout(() => {
			title.innerText = data.title;
			desc.innerHTML = data.desc;
			img.src = data.img;

			textBlock.classList.remove('fade-out');
			img.style.opacity = '1';
		}, 300);
	};
	</script>
</body>
</html>
