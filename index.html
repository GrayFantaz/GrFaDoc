<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Серый Фэнтези</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f8f9fa;
            --text-color: #333333;
            --link-color: #0056b3;
            --link-hover: #003d82;
            --border-color: #e9ecef;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .site-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        .category {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #6c757d;
            margin-top: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .nav-link {
            display: block;
            padding: 6px 0;
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .nav-link.active {
            color: var(--link-color);
            font-weight: 600;
        }

        /* Основной контент */
        main {
            flex: 1;
            padding: 40px 60px;
            background-color: var(--bg-color);
            overflow-y: auto;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { font-size: 2.5rem; margin-top: 0; }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 40px; }
        
        .content p { line-height: 1.6; margin-bottom: 15px; }
        .content code { background: #f1f3f5; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .content pre { background: #212529; color: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>

    <aside>
        <div class="site-title">🔲 Серый Фэнтези</div>
        <nav id="sidebar-nav">
            </nav>
    </aside>

    <main>
        <div class="content-container">
            <h1 id="doc-title">Загрузка...</h1>
            <div id="doc-content" class="content"></div>
        </div>
    </main>

    <script src="data.js"></script>

	<script>
		const sidebarNav = document.getElementById('sidebar-nav');
		const docTitle = document.getElementById('doc-title');
		const docContent = document.getElementById('doc-content');

		function renderSidebar() {
			const grouped = {};
			articles.forEach(article => {
				if (!grouped[article.category]) {
					grouped[article.category] = [];
				}
				grouped[article.category].push(article);
			});

			let html = '';
			for (const category in grouped) {
				html += `<div class="category">${category}</div>`;
				grouped[category].forEach(article => {
					html += `<a class="nav-link" data-id="${article.id}">${article.title}</a>`;
				});
			}
			sidebarNav.innerHTML = html;

			document.querySelectorAll('.nav-link').forEach(link => {
				link.addEventListener('click', (e) => {
					const id = e.target.getAttribute('data-id');
					loadArticle(id);
				});
			});
		}

		function loadArticle(id) {
			const article = articles.find(a => a.id === id);
			if (article) {
				docTitle.innerHTML = article.title;
				docContent.innerHTML = article.content;

				document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
				const activeLink = document.querySelector(`.nav-link[data-id="${id}"]`);
				if (activeLink) activeLink.classList.add('active');
			}
		}


		renderSidebar();
		loadArticle('intro');
	</script>
</body>
</html>
