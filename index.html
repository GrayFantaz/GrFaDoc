<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Серый Фэнтези</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --sidebar-bg: #f8f9fa;
            --text-color: #333333;
            --link-color: #0056b3;
            --link-hover: #003d82;
            --border-color: #e9ecef;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .site-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        .category {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #6c757d;
            margin-top: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .nav-link {
            display: block;
            padding: 6px 0;
            color: var(--text-color);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .nav-link.active {
            color: var(--link-color);
            font-weight: 600;
        }

        main {
            flex: 1;
            padding: 40px 60px;
            background-color: var(--bg-color);
            overflow-y: auto;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }
		
		.category-header {
			font-size: 0.9rem;
			text-transform: uppercase;
			font-weight: 700;
			color: #495057;
			margin-top: 15px;
			margin-bottom: 5px;
			cursor: pointer;
			user-select: none;
		}

		.category-header:hover, .subcategory-header:hover {
			color: var(--link-color);
		}

		.subcategory-list {
			display: none; 
			padding-left: 10px;
			border-left: 2px solid var(--border-color);
			margin-left: 5px;
		}
	
		.subcategory-header {
			font-size: 0.85rem;
			font-weight: 600;
			color: #6c757d;
			margin-top: 10px;
			margin-bottom: 5px;
			cursor: pointer;
			user-select: none;
		}

		.article-list {
			display: none;
			padding-left: 15px;
		}

		.expanded {
			display: block !important;
		}

		.toggle-icon {
			display: inline-block;
			width: 15px;
			transition: transform 0.2s;
		}
		.expanded-icon {
			transform: rotate(90deg);
		}

        h1 { font-size: 2.5rem; margin-top: 0; }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 40px; }
        
        .content p { line-height: 1.6; margin-bottom: 15px; }
        .content code { background: #f1f3f5; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .content pre { background: #212529; color: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>

    <aside>
        <div class="site-title">🔲 Серый Фэнтези</div>
        <nav id="sidebar-nav">
            </nav>
    </aside>

    <main>
        <div class="content-container">
            <h1 id="doc-title">Загрузка...</h1>
            <div id="doc-content" class="content"></div>
        </div>
    </main>

    <script src="data.js"></script>

<script>
	const sidebarNav = document.getElementById('sidebar-nav');
	const docTitle = document.getElementById('doc-title');
	const docContent = document.getElementById('doc-content');

	function renderSidebar() {
		const hierarchy = {};

		articles.forEach(article => {
			const cat = article.category || 'Без категории';
			const subcat = article.subcategory || 'Общее';

			if (!hierarchy[cat]) hierarchy[cat] = {};
			if (!hierarchy[cat][subcat]) hierarchy[cat][subcat] = [];

			hierarchy[cat][subcat].push(article);
		});

		let html = '';
		for (const cat in hierarchy) {
			html += `
				<div class="category-group">
					<div class="category-header" onclick="toggleVisibility(this)">
						<span class="toggle-icon">▶</span> ${cat}
					</div>
					<div class="subcategory-list">
			`;

			for (const subcat in hierarchy[cat]) {
				html += `
					<div class="subcategory-group">
						<div class="subcategory-header" onclick="toggleVisibility(this)">
							<span class="toggle-icon">▶</span> ${subcat}
						</div>
						<div class="article-list">
				`;

				hierarchy[cat][subcat].forEach(article => {
					html += `<a class="nav-link" data-id="${article.id}" onclick="handleArticleClick(event, '${article.id}')">${article.title}</a>`;
				});

				html += `</div></div>`; 
			}
			html += `</div></div>`; 
		}
    
		sidebarNav.innerHTML = html;
	}

	window.toggleVisibility = function(element) {
		const nextElement = element.nextElementSibling;
		const icon = element.querySelector('.toggle-icon');
    
		if (nextElement) {
			nextElement.classList.toggle('expanded');
		}
		if (icon) {
			icon.classList.toggle('expanded-icon');
		}
	};

	window.handleArticleClick = function(event, id) {
		loadArticle(id);
	}

	function loadArticle(id) {
		const article = articles.find(a => a.id === id);
		if (article) {
			docTitle.innerHTML = article.title;
			docContent.innerHTML = article.content;

			document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
			const activeLink = document.querySelector(`.nav-link[data-id="${id}"]`);
			if (activeLink) activeLink.classList.add('active');
		} else {
			docTitle.innerHTML = "Статья не найдена";
			docContent.innerHTML = "<p>Выберите статью из меню слева.</p>";
		}
	}

	renderSidebar();
	loadArticle('firstact'); 
	</script>
</body>
</html>
